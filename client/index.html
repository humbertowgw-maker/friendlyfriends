<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Rate Gauge</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a25;
        --border: #2a2a3a; --text: #e4e4ef; --text-dim: #8888a0;
        --accent: #6366f1; --accent-dim: #4f46e5;
        --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
        --blue: #3b82f6; --purple: #a855f7;
        --radius: 12px;
      }
      body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, system-ui, sans-serif; line-height: 1.5; }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
